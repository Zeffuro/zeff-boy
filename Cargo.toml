[package]
name = "zeff-boy"
version = "0.1.0"
edition = "2024"
authors = ["Zeffuro"]
license = "MIT OR Apache-2.0"
description = "A Game Boy and Game Boy Color emulator written in Rust."
repository = "https://github.com/zeffuro/zeff-boy"

[dependencies]
anyhow = "1.0.102"
cpal = "0.17.3"
env_logger = "0.11.9"
log = "0.4.29"
wgpu = "29.0.0"
winit = "0.30.13"
phf = { version = "0.13.1", features = ["macros"] }
pollster = "0.4.0"
egui = "0.33.3"
egui-winit = "0.33.3"
bytemuck = { version = "1.24", features = ["derive"] }
rfd = "0.17.2"
gilrs = "0.11"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
dirs = "6.0.0"
sha2 = "0.10.9"