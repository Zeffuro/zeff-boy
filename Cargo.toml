[package]
name = "zeff-boy"
version = "0.1.0"
edition = "2024"
authors = ["Zeffuro"]
license = "MIT OR Apache-2.0"
description = "A Game Boy and Game Boy Color emulator written in Rust."
repository = "https://github.com/zeffuro/zeff-boy"

[dependencies]
anyhow = "1.0.102"
cpal = "0.17.3"
env_logger = "0.11.9"
log = "0.4.29"
wgpu = "27"
winit = "0.30.13"
phf = { version = "0.13.1", features = ["macros"] }
pollster = "0.4.0"
egui = "0.33.3"
egui-winit = "0.33.3"
egui-wgpu = "0.33.3"
rfd = "0.17.2"
gilrs = "0.11"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
dirs = "6.0.0"
sha2 = "0.10.9"
rtrb = "0.3.3"
egui_dock = "0.18"
crossbeam-channel = "0.5"
lz4_flex = "0.13.0"
open = "5"
png = "0.18.1"
crc32fast = "1.5.0"
arrayvec = "0.7.6"

[profile.dev]
opt-level = 1

[profile.dev.package."*"]
opt-level = 3

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1
panic = "abort"
strip = "symbols"