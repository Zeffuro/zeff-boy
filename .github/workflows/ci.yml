name: CI

on:
  push:
    branches: [master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  linux:
    name: Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libudev-dev xvfb

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: taiki-e/install-action@cargo-nextest

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-linux"

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (all features)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Clippy (no default features)
        run: cargo clippy --workspace --all-targets --no-default-features -- -D warnings

      - name: Build
        run: cargo build --workspace

      - name: Build (no default features)
        run: cargo build --workspace --no-default-features

      - name: Run tests
        run: xvfb-run --auto-servernum cargo nextest run --workspace

      - name: Run tests (no default features)
        run: xvfb-run --auto-servernum cargo nextest run --workspace --no-default-features

      - name: Bench compile check
        run: cargo bench --no-run --workspace

      - name: Run benchmarks
        run: cargo bench --workspace -- --output-format bencher 2>/dev/null | tee benchmark-results.txt

      - name: Upload benchmark results
        if: github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark-results.txt
          retention-days: 90

  windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: taiki-e/install-action@cargo-nextest

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-windows"

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (all features)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Clippy (no default features)
        run: cargo clippy --workspace --all-targets --no-default-features -- -D warnings

      - name: Build
        run: cargo build --workspace

      - name: Build (no default features)
        run: cargo build --workspace --no-default-features

      - name: Run tests
        run: cargo nextest run --workspace

      - name: Run tests (no default features)
        run: cargo nextest run --workspace --no-default-features

  macos:
    name: macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: taiki-e/install-action@cargo-nextest

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-macos"

      - name: Clippy (all features)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Build
        run: cargo build --workspace

      - name: Build (no default features)
        run: cargo build --workspace --no-default-features

      - name: Run tests
        run: cargo nextest run --workspace

  fuzz-check:
    name: Fuzz Compile Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libudev-dev

      - uses: dtolnay/rust-toolchain@nightly

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-fuzz"
          workspaces: "fuzz -> fuzz/target"

      - name: Check fuzz targets compile
        run: cargo +nightly check --manifest-path fuzz/Cargo.toml

  deny:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: EmbarkStudios/cargo-deny-action@v2

