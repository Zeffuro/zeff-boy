name: CI

on:
  push:
    branches: [master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  linux:
    name: Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libudev-dev xvfb

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v2-linux"

      - name: Format check
        run: cargo fmt --all -- --check
        if: always()

      - name: Clippy (all features)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
        if: always()

      - name: Clippy (no default features)
        run: cargo clippy --workspace --all-targets --no-default-features -- -D warnings
        if: always()

      - name: Platform-leak audit
        run: |
          # Fail if any native-only API (rfd, gilrs, cpal, dirs, etc.) appears
          # in shared src/ code outside of platform/input/audio/cli/camera modules.
          # Files named *native.rs are excluded (inherently platform-specific).
          # camera/ is excluded (feature-gated module).
          # libretro_common.rs is excluded (all native API usage is cfg-gated).
          ! grep -rn --include='*.rs' --exclude='*native.rs' \
            -E '(rfd::|gilrs::|cpal::|dirs::|open::that|ureq::|pollster::block_on|nokhwa::)' src/ \
            --exclude-dir=platform --exclude-dir=input --exclude-dir=audio --exclude-dir=camera \
            | grep -v 'cli/' | grep -v 'libretro_common\.rs' | grep -v '// platform-ok'

      - name: Build
        run: cargo build --workspace

      - name: Build (no default features)
        run: cargo build --workspace --no-default-features

      - name: Run tests
        run: xvfb-run --auto-servernum cargo nextest run --workspace

      - name: Run tests (no default features)
        run: xvfb-run --auto-servernum cargo nextest run --workspace --no-default-features

      - name: Bench compile check
        run: cargo bench --no-run --workspace

      - name: Run benchmarks
        run: cargo bench --workspace -- --output-format bencher 2>/dev/null | tee benchmark-results.txt

      - name: Upload benchmark results
        if: github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-results
          path: benchmark-results.txt
          retention-days: 90

      - name: Job summary
        if: failure()
        run: |
          echo "## ❌ Linux CI Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "One or more steps in the Linux CI job failed. Check the logs above for details." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Quick reproduction" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "just ci-local" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v2-windows"

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (all features)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Clippy (no default features)
        run: cargo clippy --workspace --all-targets --no-default-features -- -D warnings

      - name: Build
        run: cargo build --workspace

      - name: Build (no default features)
        run: cargo build --workspace --no-default-features

      - name: Run tests
        run: cargo nextest run --workspace

      - name: Run tests (no default features)
        run: cargo nextest run --workspace --no-default-features

      - name: Job summary
        if: failure()
        shell: bash
        run: |
          echo "## ❌ Windows CI Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "One or more steps in the Windows CI job failed. Check the logs above for details." >> $GITHUB_STEP_SUMMARY

  macos:
    name: macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v2-macos"

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (all features)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Clippy (no default features)
        run: cargo clippy --workspace --all-targets --no-default-features -- -D warnings

      - name: Build
        run: cargo build --workspace

      - name: Build (no default features)
        run: cargo build --workspace --no-default-features

      - name: Run tests
        run: cargo nextest run --workspace

      - name: Run tests (no default features)
        run: cargo nextest run --workspace --no-default-features

      - name: Job summary
        if: failure()
        run: |
          echo "## ❌ macOS CI Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "One or more steps in the macOS CI job failed. Check the logs above for details." >> $GITHUB_STEP_SUMMARY

  fuzz-check:
    name: Fuzz Compile Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libudev-dev

      - uses: dtolnay/rust-toolchain@nightly

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v2-fuzz"
          workspaces: "fuzz -> fuzz/target"

      - name: Check fuzz targets compile
        run: cargo +nightly check --manifest-path fuzz/Cargo.toml

  wasm:
    name: WASM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v2-wasm"

      - name: Clippy (WASM)
        run: cargo clippy --target wasm32-unknown-unknown --no-default-features -- -D warnings

      - name: Check WASM target compiles
        run: cargo check --target wasm32-unknown-unknown --no-default-features

  deny:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: EmbarkStudios/cargo-deny-action@v2
