name: CI

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-latest
            deps: sudo apt-get update && sudo apt-get install -y libasound2-dev libudev-dev
          - name: Windows
            os: windows-latest
          - name: macOS
            os: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        if: matrix.deps
        run: ${{ matrix.deps }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v3-${{ matrix.name }}

      - name: Clippy (all features)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Clippy (no default features)
        run: cargo clippy --workspace --all-targets --no-default-features -- -D warnings

  test:
    name: Test (${{ matrix.name }})
    needs: clippy
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-latest
            deps: sudo apt-get update && sudo apt-get install -y libasound2-dev libudev-dev xvfb
            wrapper: xvfb-run --auto-servernum
          - name: Windows
            os: windows-latest
            wrapper: ""
          - name: macOS
            os: macos-latest
            wrapper: ""
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        if: matrix.deps
        run: ${{ matrix.deps }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v3-${{ matrix.name }}

      - name: Run tests
        run: ${{ matrix.wrapper }} cargo nextest run --workspace

      - name: Run tests (no default features)
        run: ${{ matrix.wrapper }} cargo nextest run --workspace --no-default-features

  platform-audit:
    name: Platform-leak audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check for platform API leaks
        run: |
          ! grep -rn --include='*.rs' --exclude='*native.rs' \
            -E '(rfd::|gilrs::|cpal::|dirs::|open::that|ureq::|pollster::block_on|nokhwa::)' src/ \
            --exclude-dir=platform --exclude-dir=input --exclude-dir=audio --exclude-dir=camera \
            | grep -v 'cli/' | grep -v 'libretro_common\.rs' | grep -v '// platform-ok'

  bench:
    name: Benchmarks
    needs: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libudev-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v3-bench

      - name: Run benchmarks
        run: cargo bench --workspace -- --output-format bencher 2>/dev/null | tee benchmark-results.txt

      - name: Upload benchmark results
        if: github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-results
          path: benchmark-results.txt
          retention-days: 90

  wasm:
    name: WASM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v3-wasm

      - name: Clippy (WASM)
        run: cargo clippy --target wasm32-unknown-unknown --no-default-features -- -D warnings

  fuzz-check:
    name: Fuzz Compile Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libudev-dev

      - uses: dtolnay/rust-toolchain@nightly

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v3-fuzz
          workspaces: "fuzz -> fuzz/target"

      - run: cargo +nightly check --manifest-path fuzz/Cargo.toml

  deny:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: EmbarkStudios/cargo-deny-action@v2
