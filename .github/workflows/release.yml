name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: zeff-boy
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: zeff-boy.exe
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: zeff-boy

    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libudev-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v2-release-${{ matrix.target }}"

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          cp ../../../packaging/zeff-boy.desktop .
          cp ../../../LICENSE-MIT .
          cp ../../../LICENSE-APACHE .
          cp ../../../assets/icon.png zeff-boy.png
          tar czf ../../../zeff-boy-${{ github.ref_name }}-${{ matrix.target }}.tar.gz \
            ${{ matrix.artifact }} zeff-boy.desktop LICENSE-MIT LICENSE-APACHE zeff-boy.png

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../zeff-boy-${{ github.ref_name }}-${{ matrix.target }}.zip ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: zeff-boy-${{ matrix.target }}
          path: zeff-boy-${{ github.ref_name }}-${{ matrix.target }}.*

  libretro:
    name: Libretro Core (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            lib: libzeff_libretro.so
            archive_name: zeff_libretro-linux-x86_64.tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            lib: zeff_libretro.dll
            archive_name: zeff_libretro-windows-x86_64.zip
          - target: aarch64-apple-darwin
            os: macos-latest
            lib: libzeff_libretro.dylib
            archive_name: zeff_libretro-macos-aarch64.tar.gz

    steps:
      - uses: actions/checkout@v6

      - name: Sync .info display_version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ "$OSTYPE" == darwin* ]]; then
            sed -i '' "s/^display_version = .*/display_version = \"${VERSION}\"/" crates/zeff-libretro/zeff_libretro.info
          else
            sed -i "s/^display_version = .*/display_version = \"${VERSION}\"/" crates/zeff-libretro/zeff_libretro.info
          fi

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libudev-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v2-libretro-${{ matrix.target }}"

      - name: Build libretro core
        run: cargo build --release --target ${{ matrix.target }} -p zeff-libretro

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          cp ../../../crates/zeff-libretro/zeff_libretro.info .
          tar czf ../../../${{ matrix.archive_name }} ${{ matrix.lib }} zeff_libretro.info

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          cp ../../../crates/zeff-libretro/zeff_libretro.info .
          7z a ../../../${{ matrix.archive_name }} ${{ matrix.lib }} zeff_libretro.info

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: libretro-${{ matrix.target }}
          path: ${{ matrix.archive_name }}

  appimage:
    name: AppImage
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download Linux build
        uses: actions/download-artifact@v8
        with:
          name: zeff-boy-x86_64-unknown-linux-gnu
          path: linux-artifact

      - name: Extract binary
        run: |
          cd linux-artifact
          tar xzf zeff-boy-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz

      - name: Install system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2t64 libudev1 libfuse2

      - name: Create AppDir structure
        run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/metainfo
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps

          cp linux-artifact/zeff-boy AppDir/usr/bin/zeff-boy
          chmod +x AppDir/usr/bin/zeff-boy

          cp packaging/zeff-boy.desktop AppDir/usr/share/applications/zeff-boy.desktop
          cp packaging/com.github.zeffuro.zeff-boy.metainfo.xml AppDir/usr/share/metainfo/
          cp packaging/com.github.zeffuro.zeff-boy.metainfo.xml AppDir/usr/share/metainfo/zeff-boy.appdata.xml

          cp assets/icon.png AppDir/usr/share/icons/hicolor/256x256/apps/zeff-boy.png

          cp AppDir/usr/share/applications/zeff-boy.desktop AppDir/zeff-boy.desktop
          cp AppDir/usr/share/icons/hicolor/256x256/apps/zeff-boy.png AppDir/zeff-boy.png

      - name: Download linuxdeploy and AppImage runtime
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage

          # Pre-download the type-2 runtime with retries (avoids transient 504s from GitHub CDN)
          for i in 1 2 3 4 5; do
            if wget -q -O runtime-x86_64 https://github.com/AppImage/type2-runtime/releases/download/continuous/runtime-x86_64; then
              echo "Runtime downloaded on attempt $i"
              break
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done

          if [ ! -f runtime-x86_64 ]; then
            echo "::error::Failed to download AppImage runtime after 5 attempts"
            exit 1
          fi

      - name: Build AppImage
        run: |
          TAG="${{ github.ref_name }}"
          export LINUXDEPLOY_OUTPUT_VERSION="${TAG}"
          export APPIMAGE_EXTRACT_AND_RUN=1
          ./linuxdeploy-x86_64.AppImage --appdir AppDir --output appimage

          # Ensure the expected filename exists
          EXPECTED="zeff-boy-${TAG}-x86_64.AppImage"
          if [ ! -f "$EXPECTED" ]; then
            mv zeff-boy-*x86_64.AppImage "$EXPECTED"
          fi

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v7
        with:
          name: zeff-boy-appimage
          path: zeff-boy-${{ github.ref_name }}-x86_64.AppImage

  release:
    name: Create Release
    needs: [build, libretro, appimage]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*

  update-scoop:
    name: Update Scoop manifest
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          repository: Zeffuro/scoop-zeff-boy
          token: ${{ secrets.PACKAGE_REPO_TOKEN }}

      - name: Update manifest
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          URL="https://github.com/Zeffuro/zeff-boy/releases/download/v${VERSION}/zeff-boy-v${VERSION}-x86_64-pc-windows-msvc.zip"
          SHA256=$(curl -sL "$URL" | sha256sum | cut -d' ' -f1)
          jq -n \
            --arg ver "$VERSION" \
            --arg url "$URL" \
            --arg hash "$SHA256" \
            '{
              version: $ver,
              description: "A Game Boy, Game Boy Color, and NES emulator written in Rust",
              homepage: "https://github.com/Zeffuro/zeff-boy",
              license: { identifier: "MIT|Apache-2.0", url: "https://github.com/Zeffuro/zeff-boy/blob/master/LICENSE-MIT" },
              architecture: { "64bit": { url: $url, hash: $hash } },
              bin: "zeff-boy.exe",
              checkver: { github: "https://github.com/Zeffuro/zeff-boy" },
              autoupdate: { architecture: { "64bit": { url: "https://github.com/Zeffuro/zeff-boy/releases/download/v$version/zeff-boy-v$version-x86_64-pc-windows-msvc.zip" } } }
            }' > bucket/zeff-boy.json

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bucket/zeff-boy.json
          git diff --cached --quiet || git commit -m "Update zeff-boy to ${GITHUB_REF_NAME}"
          git push

  update-homebrew:
    name: Update Homebrew cask
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          repository: Zeffuro/homebrew-zeff-boy
          token: ${{ secrets.PACKAGE_REPO_TOKEN }}

      - name: Update cask
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          URL="https://github.com/Zeffuro/zeff-boy/releases/download/v${VERSION}/zeff-boy-v${VERSION}-aarch64-apple-darwin.tar.gz"
          SHA256=$(curl -sL "$URL" | sha256sum | cut -d' ' -f1)
          python3 -c "
          v, s = '${VERSION}', '${SHA256}'
          print(f'''cask \"zeff-boy\" do
            version \"{v}\"
            sha256 \"{s}\"

            url \"https://github.com/Zeffuro/zeff-boy/releases/download/v#{{version}}/zeff-boy-v#{{version}}-aarch64-apple-darwin.tar.gz\"
            name \"zeff-boy\"
            desc \"A Game Boy, Game Boy Color, and NES emulator written in Rust\"
            homepage \"https://github.com/Zeffuro/zeff-boy\"

            binary \"zeff-boy\"

            livecheck do
              url :url
              strategy :github_latest
            end
          end''')
          " > Casks/zeff-boy.rb

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/zeff-boy.rb
          git diff --cached --quiet || git commit -m "Update zeff-boy to ${GITHUB_REF_NAME}"
          git push

  update-aur:
    name: Update AUR
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Generate PKGBUILD and .SRCINFO
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          URL="https://github.com/Zeffuro/zeff-boy/releases/download/v${VERSION}/zeff-boy-v${VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          SHA256=$(curl -sL "$URL" | sha256sum | cut -d' ' -f1)
          mkdir -p aur-work
          python3 scripts/generate-aur.py "$VERSION" "$SHA256" aur-work

      - name: Push to AUR
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$AUR_SSH_KEY" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          printf 'Host aur.archlinux.org\n  IdentityFile ~/.ssh/aur\n  User aur\n  StrictHostKeyChecking accept-new\n' > ~/.ssh/config

          git clone ssh://aur@aur.archlinux.org/zeff-boy-bin.git aur-repo
          cp aur-work/PKGBUILD aur-repo/PKGBUILD
          cp aur-work/.SRCINFO aur-repo/.SRCINFO

          cd aur-repo
          git config user.name "Zeffuro"
          git config user.email "Jeffroiscool@gmail.com"
          git add PKGBUILD .SRCINFO
          git diff --cached --quiet || git commit -m "Update to v${GITHUB_REF_NAME#v}"
          git push

